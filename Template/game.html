<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partie - UNO WEB</title>
    <link rel="stylesheet" href="/static/Images/style.css">
    <style>
        .cards-row {
            align-items: center;
        }

        .uno-card {
            width: 82px;
            height: 126px;
            padding: 0;
            border: none;
            background: transparent;
            box-shadow: none;
        }

        .uno-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.35));
        }
    </style>
</head>
<body class="page">
    <header class="site-header">
        <div class="header-content">
            <div class="header-logo">
                <a href="/index" class="brand-title">UNO WEB</a>
            </div>
            <nav class="header-nav">
                <span id="header-username" class="header-username"></span>
                <a href="/lobby">Lobby</a>
                <a href="/logout">Se deconnecter</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="game-board">
            <div class="score-board">
                <h2>Partie en cours</h2>
                <p>Tour: <strong id="turn-player">-</strong></p>
                <p>Etat: <strong id="game-status">En attente...</strong></p>
            </div>

            <div class="discard-pile">
                <h3>Defausse</h3>
                <div class="cards-row">
                    <div class="uno-card" id="top-card">-</div>
                </div>
            </div>

            <div class="draw-pile">
                <h3>Pioche</h3>
                <p id="draw-count">Cartes restantes: 72</p>
                <button id="draw-btn" class="btn-secondary" type="button">Piocher une carte</button>
                <button id="uno-btn" type="button">UNO !</button>
                <button id="start-btn" type="button">Lancer la partie</button>
            </div>

            <div class="player-hand">
                <h3>Ma main</h3>
                <div class="cards-row" id="player-hand-cards"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 UNO WEB.</p>
    </footer>

    <script>
        const COLORS = ['red', 'blue', 'green', 'yellow']
        let gameState = null
        let currentUser = null

        function cardLabel(card) {
            if (!card) return '-'
            return `${card.value} ${card.color === 'wild' ? '' : card.color}`.trim()
        }

        function cardImagePath(card) {
            if (!card) return null
            if (card.color === 'wild') {
                return `/static/Images/UNO_Other/${card.value}_Other.png`
            }
            return `/static/Images/UNO_${card.color}/${card.value}_${card.color}.png`
        }

        function renderCardFace(container, card) {
            container.innerHTML = ''
            const img = document.createElement('img')
            img.src = cardImagePath(card)
            img.alt = cardLabel(card)
            img.onerror = () => {
                container.innerHTML = ''
                container.textContent = cardLabel(card)
            }
            container.appendChild(img)
        }

        function setStatus(text) {
            document.getElementById('game-status').textContent = text
        }

        async function api(path, options = {}) {
            const res = await fetch(path, options)
            const contentType = res.headers.get('content-type') || ''
            const payload = contentType.includes('application/json') ? await res.json() : await res.text()
            if (!res.ok) {
                const errorMessage = typeof payload === 'string' ? payload : payload.error
                throw new Error(errorMessage || 'Erreur API')
            }
            return payload
        }

        async function loadProfile() {
            const user = await api('/api/me')
            currentUser = user
            document.getElementById('header-username').textContent = user.name || 'Joueur'
        }

        function render() {
            if (!gameState) return
            document.getElementById('turn-player').textContent = gameState.turnPlayer || '-'
            document.getElementById('draw-count').textContent = `Cartes restantes: ${gameState.drawCount}`
            const topCardEl = document.getElementById('top-card')
            renderCardFace(topCardEl, gameState.topCard)
            topCardEl.style.borderColor = gameState.currentColor || 'rgba(255, 255, 255, 0.18)'
            document.getElementById('game-status').textContent = gameState.status === 'ended'
                ? `Partie terminee - gagnant: ${gameState.winner}`
                : `Couleur active: ${gameState.currentColor}`

            const handContainer = document.getElementById('player-hand-cards')
            handContainer.innerHTML = ''
            if (gameState.hand.length === 0) {
                const empty = document.createElement('p')
                empty.textContent = 'Aucune carte. Lance la partie depuis cette salle.'
                handContainer.appendChild(empty)
            }
            gameState.hand.forEach((card, idx) => {
                const btn = document.createElement('button')
                btn.type = 'button'
                btn.className = 'uno-card'
                btn.style.borderColor = card.color === 'wild' ? '#fff' : card.color
                renderCardFace(btn, card)
                btn.onclick = () => playCard(idx, card)
                handContainer.appendChild(btn)
            })

            const isTurn = gameState.turnPlayer === currentUser?.name && gameState.status === 'playing'
            document.getElementById('draw-btn').disabled = !isTurn
            document.getElementById('uno-btn').disabled = !isTurn
            document.getElementById('start-btn').disabled = gameState.status === 'playing'
        }

        async function loadGameState() {
            try {
                gameState = await api('/api/game/state')
                render()
            } catch (err) {
                setStatus(err.message)
            }
        }

        async function startGame() {
            try {
                gameState = await api('/api/game/start', { method: 'POST' })
                render()
            } catch (err) {
                setStatus(err.message)
            }
        }

        async function playCard(index, card) {
            if (!gameState || gameState.turnPlayer !== currentUser?.name) return
            let chosenColor
            if (card.color === 'wild') {
                chosenColor = prompt('Choisis une couleur: red, blue, green, yellow', 'red')
                if (!COLORS.includes(chosenColor)) {
                    setStatus('Couleur invalide')
                    return
                }
            }
            try {
                gameState = await api('/api/game/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cardIndex: index, chosenColor })
                })
                render()
            } catch (err) {
                setStatus(err.message)
            }
        }

        async function drawCard() {
            try {
                gameState = await api('/api/game/draw', { method: 'POST' })
                render()
            } catch (err) {
                setStatus(err.message)
            }
        }

        async function callUno() {
            try {
                await api('/api/game/uno', { method: 'POST' })
                setStatus('UNO annonce')
            } catch (err) {
                setStatus(err.message)
            }
        }

        document.getElementById('draw-btn').addEventListener('click', drawCard)
        document.getElementById('uno-btn').addEventListener('click', callUno)
        document.getElementById('start-btn').addEventListener('click', startGame)

        ;(async function init() {
            try {
                await loadProfile()
                await loadGameState()
                setInterval(loadGameState, 3000)
            } catch (err) {
                window.location.href = '/connexion'
            }
        })()
    </script>
</body>
</html>
