<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="../static/Images/style.css">
</head>
<body class="page">
<!-- Page top "navigation bar" -->
    <header class="site-header">
        <div class="header-content">
            <div class="header-logo">
                <a href="/index" class="brand-title">UNO WEB</a>
            </div >
            <nav class="header-nav">
                <a href="/index" class="nav-link">Inscription</a>
                <a href="/connexion" class="nav-link">Connexion</a>
            </nav>
        </div>
    </header>
<!-- Page Content -->
    <div class="container">
        <main class="content">
            <div class="page-header">
                <h1>Inscription</h1>
                <form action="/inscription" method="post">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                    <button type="submit">Inscription</button>
                </form>
            </div>
        </main>
    </div>
<!-- Page bottom -->
    <footer class="site-footer">
        <p>&copy; Uno Web. All rights reserved.</p>
    </footer>

</html>
