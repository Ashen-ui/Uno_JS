<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="/static/Images/style.css">
</head>
<body class="page">
    <!-- Page top -->
    <header class="site-header">
        <div class="header-content">
            <div class="header-logo">
                <a href="/index" class="brand-title">UNO WEB</a>
            </div>
            <nav class="header-nav">
                <a href="/inscription" class="nav-link">Inscription</a>
                <a href="/connexion" class="nav-link">Connexion</a>
            </nav>
        </div>
    </header>
    <main class="content">
        <div class="page-header">
            <h1>Inscription</h1>
            <p>Créez votre compte en quelques secondes pour rejoindre la partie.</p>
            
            <div id="registration-error" class="error-message" style="display: none;"></div>
            <div id="registration-success" class="success-message" style="display: none;"></div>
            
            <form>
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
                <label for="password-confirm">Confirmer le mot de passe</label>
                <input type="password" id="password-confirm" name="password-confirm" required>
                <button type="submit">Inscription</button>
            </form>

            <p style="margin-top: 20px;">Vous avez déjà un compte ? <a href="/connexion">Connectez-vous ici</a></p>
        </div>
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 UNO WEB. All rights reserved.</p>
    </footer>
    <script src="/static/js/register.js"></script>
</body>
</html>
